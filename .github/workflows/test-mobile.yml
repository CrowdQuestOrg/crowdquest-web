name: Test mobile

on:
  pull_request:
    paths:
      - "apps/mobile/**"
      - "packages/shared-types/**"
      - "packages/shared-utils/**"
  push:
    branches: [main, develop]
    paths:
      - "apps/mobile/**"

jobs:
  unit:
    name: Unit tests (Jest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm --filter @crowdquest/mobile test --ci --coverage --reporters=default --reporters=jest-junit
        env:
          JEST_JUNIT_OUTPUT_DIR: reports/junit
          JEST_JUNIT_OUTPUT_NAME: mobile-unit.xml

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mobile-unit-results
          path: apps/mobile/reports/junit/*.xml

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: apps/mobile/coverage/lcov.info
          flags: mobile-unit
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  e2e-ios:
    name: E2E tests (iOS simulator)
    runs-on: macos-14
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Detox CLI
        run: npm install -g detox-cli

      - name: Install pods
        working-directory: apps/mobile/ios
        run: pod install

      - name: Build for E2E (Debug)
        working-directory: apps/mobile
        run: detox build --configuration ios.sim.debug

      - name: Run E2E tests
        working-directory: apps/mobile
        run: detox test --configuration ios.sim.debug --cleanup --headless --record-logs all

      - name: Upload E2E artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-ios-artifacts
          path: apps/mobile/artifacts/

  e2e-android:
    name: E2E tests (Android emulator)
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Enable KVM group perms
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Detox CLI
        run: npm install -g detox-cli

      - name: Build for E2E (Debug)
        working-directory: apps/mobile
        run: detox build --configuration android.emu.debug

      - name: Run E2E tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 33
          target: google_apis
          arch: x86_64
          working-directory: apps/mobile
          script: detox test --configuration android.emu.debug --cleanup --headless --record-logs all

      - name: Upload E2E artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-android-artifacts
          path: apps/mobile/artifacts/
