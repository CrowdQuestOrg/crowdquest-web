name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: Version to release (e.g. 1.2.0)
        required: true
      mobile_platform:
        description: Mobile platform to build
        type: choice
        options:
          - all
          - ios
          - android
        default: all

jobs:
  validate-tag:
    name: Validate release
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.v }}
    steps:
      - uses: actions/checkout@v4

      - name: Extract version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            V="${GITHUB_REF#refs/tags/v}"
          else
            V="${{ github.event.inputs.version }}"
          fi
          echo "v=$V" >> "$GITHUB_OUTPUT"
          echo "Releasing version $V"

      - name: Validate semver
        run: |
          echo "${{ steps.version.outputs.v }}" | grep -E '^[0-9]+\.[0-9]+\.[0-9]+$' \
            || (echo "Invalid semver" && exit 1)

  changelog:
    name: Generate changelog
    runs-on: ubuntu-latest
    needs: validate-tag
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate changelog
        id: changelog
        uses: orhun/git-cliff-action@v3
        with:
          config: cliff.toml
          args: --verbose --tag v${{ needs.validate-tag.outputs.version }}

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.validate-tag.outputs.version }}
          name: Release v${{ needs.validate-tag.outputs.version }}
          body: ${{ steps.changelog.outputs.changelog }}
          draft: true
          prerelease: ${{ contains(needs.validate-tag.outputs.version, '-') }}

  mobile-build:
    name: EAS build (${{ matrix.platform }})
    runs-on: ubuntu-latest
    needs: validate-tag
    strategy:
      matrix:
        platform: [ios, android]
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: EAS build
        working-directory: apps/mobile
        run: |
          eas build \
            --platform ${{ matrix.platform }} \
            --profile production \
            --non-interactive \
            --auto-submit

  publish-packages:
    name: Publish npm packages
    runs-on: ubuntu-latest
    needs: [validate-tag, changelog]
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm build --filter=./packages/*

      - name: Publish shared-types
        working-directory: packages/shared-types
        run: pnpm publish --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish shared-utils
        working-directory: packages/shared-utils
        run: pnpm publish --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
